on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

name: Build Rust Binary

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.93.0
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Rename executable
        run: mv target/${{ matrix.target }}/release/mash${{ matrix.os == 'windows-latest' && '.exe' || '' }} target/${{ matrix.target }}/release/mash-${{ matrix.target }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: target/${{ matrix.target }}/release/mash-${{ matrix.target }}${{ matrix.os == 'windows-latest' && '.exe' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}